name: BlazingVoice
options:
  bundleIdPrefix: com.blazingvoice
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.blazingvoice.app

targets:
  BlazingVoice:
    type: application
    platform: macOS
    sources:
      - path: BlazingVoice
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        INFOPLIST_FILE: BlazingVoice/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: BlazingVoice/Resources/BlazingVoice.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
